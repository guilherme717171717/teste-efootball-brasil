<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — eFootball Brasil</title>
<link rel="icon" href="assets/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon-green:#00ff88;--bg-primary:#08080d;--bg-card:rgba(18,18,26,0.6);--text-primary:#fff;--text-secondary:#888;--border:rgba(255,255,255,0.06);--font:'Segoe UI',system-ui,-apple-system,sans-serif;--danger:#ff4444;--warning:#ffaa00;--radius-sm:8px;--radius:12px}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--neon-green);border-radius:4px}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:rgba(12,12,18,0.95);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-brand{padding:20px 16px;border-bottom:1px solid var(--border)}
.sidebar-brand h2{font-size:1rem;font-weight:700;color:var(--neon-green)}
.sidebar-brand p{font-size:0.7rem;color:#555;margin-top:2px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:10px 6px;overflow-y:auto}
.sidebar-nav button{background:transparent;border:none;color:var(--text-secondary);padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.8rem;text-align:left;display:flex;align-items:center;gap:10px;transition:0.2s;font-family:var(--font);width:100%}
.sidebar-nav button:hover{background:rgba(255,255,255,0.04);color:#ddd}
.sidebar-nav button.active{background:rgba(0,255,136,0.08);color:var(--neon-green);font-weight:600}
.sidebar-nav button .count{background:var(--neon-green);color:#000;font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:50px;margin-left:auto}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.sidebar-footer .user-info{font-size:0.78rem;margin-bottom:8px;padding:4px 8px}
.sidebar-footer .user-info .name{color:var(--neon-green);font-weight:600}
.sidebar-footer .user-info .role{color:var(--text-secondary);font-size:0.7rem}
.main{flex:1;padding:24px;overflow-y:auto;max-height:100vh}
.main h1{font-size:1.3rem;font-weight:700;margin-bottom:16px}

/* Login */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:90%;max-width:380px;text-align:center}
.login-box h2{font-size:1.2rem;font-weight:700;margin-bottom:4px;color:var(--neon-green)}
.login-box p{font-size:0.8rem;color:var(--text-secondary);margin-bottom:20px}
.login-box input{width:100%;padding:10px 14px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.9rem;outline:none;transition:0.2s;margin-bottom:12px}
.login-box input:focus{border-color:var(--neon-green)}
.login-box button{width:100%;padding:10px;background:var(--neon-green);color:#000;border:none;border-radius:var(--radius-sm);font-size:0.9rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:0.2s}
.login-box button:hover{opacity:0.9}
.login-box .error{color:var(--danger);font-size:0.8rem;margin-top:8px;display:none}

/* Table */
.table-wrap{overflow-x:auto;background:rgba(18,18,26,0.4);border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
th{text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03)}
tr:hover td{background:rgba(255,255,255,0.02)}

/* Badge */
.badge{display:inline-block;padding:2px 10px;border-radius:50px;font-size:0.65rem;font-weight:600}
.badge-pending{background:rgba(255,170,0,0.12);color:var(--warning)}
.badge-open{background:rgba(255,170,0,0.12);color:var(--warning)}
.badge-warning{background:rgba(255,170,0,0.12);color:var(--warning)}
.badge-danger{background:rgba(255,68,68,0.12);color:var(--danger)}
.badge-resolved{background:rgba(0,255,136,0.12);color:var(--neon-green)}
.badge-closed{background:rgba(255,255,255,0.06);color:#666}
.badge-active{background:rgba(0,255,136,0.12);color:var(--neon-green)}
.badge-expired{background:rgba(255,68,68,0.12);color:var(--danger)}

/* Buttons */
.btn{padding:7px 14px;font-size:0.75rem;border-radius:6px;cursor:pointer;border:none;font-family:var(--font);transition:0.2s;display:inline-flex;align-items:center;gap:4px;font-weight:600}
.btn-primary{background:var(--neon-green);color:#000}
.btn-primary:hover{opacity:0.9}
.btn-danger{background:rgba(255,68,68,0.12);color:var(--danger)}
.btn-danger:hover{background:rgba(255,68,68,0.2)}
.btn-ghost{background:rgba(255,255,255,0.04);color:#aaa;border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:#fff}
.btn-warning{background:rgba(255,170,0,0.12);color:var(--warning)}
.btn-warning:hover{background:rgba(255,170,0,0.2)}
.btn-green{background:rgba(0,255,136,0.12);color:var(--neon-green)}
.btn-green:hover{background:rgba(0,255,136,0.2)}
.btn-sm{padding:5px 10px;font-size:0.7rem}

/* Action bar */
.action-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.action-bar input{padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.82rem;outline:none;transition:0.2s}
.action-bar input:focus{border-color:var(--neon-green)}
.action-bar input[type=text]{flex:1;min-width:140px}
.empty{text-align:center;padding:40px 16px;color:#555;font-size:0.85rem}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast-item{padding:10px 18px;border-radius:var(--radius-sm);font-size:0.82rem;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideIn .3s ease-out;pointer-events:auto;min-width:240px}
.toast-success{background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.3);color:var(--neon-green)}
.toast-error{background:rgba(255,68,68,0.15);border:1px solid rgba(255,68,68,0.3);color:var(--danger)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:rgba(18,18,26,0.98);border:1px solid var(--border);border-radius:var(--radius);width:90%;max-width:500px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,0.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:0.95rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.2rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-close:hover{background:rgba(255,255,255,0.06);color:#fff}
.modal-body{flex:1;overflow-y:auto;padding:18px}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Messages */
.messages{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:360px;overflow-y:auto;padding-right:4px}
.message{background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.82rem}
.message .meta{font-size:0.7rem;color:var(--text-secondary);margin-bottom:4px}
.message .meta strong{color:var(--neon-green)}
.message.user{border-left:2px solid var(--warning)}
.message.admin{border-left:2px solid var(--neon-green)}
.reply-area{display:flex;gap:8px}
.reply-area textarea{flex:1;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.82rem;outline:none;resize:none;min-height:36px}
.reply-area textarea:focus{border-color:var(--neon-green)}

/* Tab content */
.tab-content{display:none}
.tab-content.active{display:block}
.stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-pill{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 18px;text-align:center;min-width:100px}
.stat-pill .num{font-size:1.3rem;font-weight:700;color:var(--neon-green)}
.stat-pill .label{font-size:0.65rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.3px}
.stat-pill-warning{border-color:rgba(255,170,0,0.3)}
.stat-pill-warning .num{color:var(--warning)}

/* Inline Chat */
.chat-layout{display:flex;flex-direction:column;height:calc(100vh - 100px)}
.chat-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.chat-header h2{font-size:1.1rem;font-weight:700;flex:1}
.chat-header .status{font-size:0.75rem}
.chat-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:8px;margin-bottom:12px;min-height:0}
.chat-msg{background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:10px 14px;max-width:80%;align-self:flex-start}
.chat-msg.admin{background:rgba(0,255,136,0.06);border-left:2px solid var(--neon-green);align-self:flex-end}
.chat-msg .meta{font-size:0.7rem;color:var(--text-secondary);margin-bottom:4px}
.chat-msg .meta strong{color:var(--neon-green)}
.chat-msg .meta .time{color:#555;margin-left:6px}
.chat-msg .text{font-size:0.85rem;line-height:1.4;word-break:break-word}
.chat-input{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.chat-input textarea{flex:1;padding:10px 14px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;resize:none;min-height:44px;max-height:120px;transition:0.2s}
.chat-input textarea:focus{border-color:var(--neon-green)}
.chat-input button{padding:10px 24px;align-self:flex-end}
.chat-empty{text-align:center;padding:60px 20px;color:#555;font-size:0.9rem}

.alert-banner{background:rgba(255,170,0,0.1);border:1px solid rgba(255,170,0,0.25);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.alert-banner .icon{font-size:1.2rem}
.alert-banner .msg{flex:1;font-size:0.82rem;color:var(--warning)}
.alert-banner .msg strong{color:#fff}
.alert-banner .btn{flex-shrink:0}
tr.expiring{background:rgba(255,170,0,0.04)}
tr.expiring:hover td{background:rgba(255,170,0,0.08)}
tr.expiring td:first-child{border-left:2px solid var(--warning)}

#userForm input, #userForm select{width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;transition:0.2s;margin-bottom:8px}
#userForm input:focus, #userForm select:focus{border-color:var(--neon-green)}
#userForm select option{background:#12121a;color:#fff}

@media(max-width:768px){
  .sidebar{width:50px}
  .sidebar-brand h2,.sidebar-brand p,.sidebar-nav button span:not(.icon){display:none}
  .sidebar-nav button{padding:8px;justify-content:center}
  .main{padding:12px}
  .stat-pill{min-width:70px;padding:8px 12px}
  .stat-pill .num{font-size:1rem}
}
</style>
</head>
<body>

<div id="loginScreen" class="login-overlay">
  <div class="login-box">
    <img src="assets/logo.png" alt="eFootball Brasil" style="height:40px;margin-bottom:8px">
    <p>Painel Administrativo</p>
    <form onsubmit="doLogin();return false">
      <input type="text" id="loginUser" placeholder="Usuário" autocomplete="username">
      <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password">
      <div class="error" id="loginError">Usuário ou senha inválidos</div>
      <button type="submit">Entrar</button>
    </form>
  </div>
</div>

<div id="app" class="layout" style="display:none">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div style="display:flex;align-items:center;gap:8px">
        <img src="assets/logo.png" alt="eFootball Brasil" style="height:28px">
        <div>
          <div style="font-size:0.9rem;font-weight:700;color:var(--neon-green)">Painel</div>
          <div style="font-size:0.65rem;color:#555">eFootball Brasil</div>
        </div>
      </div>
      <p>Admin</p>
    </div>
    <div class="sidebar-nav">
      <button class="active" data-tab="tickets" onclick="switchTab('tickets')"><span>🎫</span><span>Tickets</span><span class="count" id="countTickets">0</span></button>
      <button data-tab="reports" onclick="switchTab('reports')"><span>📢</span><span>Denúncias</span><span class="count" id="countReports">0</span></button>
      <button data-tab="purchases" onclick="switchTab('purchases')"><span>🛒</span><span>Compras</span><span class="count" id="countPurchases">0</span></button>
      <button data-tab="vips" onclick="switchTab('vips')"><span>⭐</span><span>VIPs</span><span class="count" id="countVips">0</span></button>
      <button data-tab="staff" onclick="switchTab('staff')"><span>👥</span><span>Staff</span><span class="count" id="countStaff">0</span></button>
      <button data-tab="users" onclick="switchTab('users')"><span>👤</span><span>Usuários</span><span class="count" id="countUsers">0</span></button>
    </div>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="name" id="userName">—</div>
        <div class="role" id="userRole">—</div>
      </div>
      <button onclick="logout()" class="btn btn-danger btn-sm" style="width:100%">🚪 Sair</button>
    </div>
  </div>

  <div class="main">
    <div id="tabTickets" class="tab-content active"></div>
    <div id="tabReports" class="tab-content"></div>
    <div id="tabPurchases" class="tab-content"></div>
    <div id="tabVips" class="tab-content"></div>
    <div id="tabStaff" class="tab-content"></div>
    <div id="tabUsers" class="tab-content"></div>
    <div id="tabTicketChat" class="tab-content"></div>
    <div id="tabReportChat" class="tab-content"></div>
  </div>
</div>

<div class="modal-overlay" id="genericModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="genericModalTitle">Detalhes</h3>
      <button class="modal-close" onclick="closeModal('genericModal')">✕</button>
    </div>
    <div class="modal-body" id="genericModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('genericModal')">Fechar</button>
    </div>
  </div>
</div>

<div class="toast" id="toastContainer"></div>

<script src="js/config.js"></script>
<script>
const API = window.SITE_CONFIG?.API_BASE || '';
const BASE_PATH = window.SITE_CONFIG?.BASE_PATH || '';
const WS_URL = window.SITE_CONFIG?.WS_URL || (API ? API.replace(/^http/, 'ws') : '');
function pageUrl(path) { return BASE_PATH + '/' + path.replace(/^\//, ''); }
const STATIC_MODE = !API;
let TOKEN = new URLSearchParams(location.search).get('token') || sessionStorage.getItem('adminToken');
let USER = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
let currentTab = 'tickets';
let stores = { tickets: [], reports: [], purchases: [], vips: [], staff: [] };
let usersList = [];
let refreshInterval = null;
let chatTicketId = null;
let chatInterval = null;
let currentChatTicketId = null;
const VIP_PLANS = ['VIP Gold Mensal', 'VIP Gold Permanente', 'VIP Black Mensal', 'VIP Black Permanente', 'VIP Personalizado'];

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function getLocalStore(name) {
  try { return JSON.parse(localStorage.getItem('admin_' + name) || '[]'); }
  catch { return []; }
}

function saveLocalStore(name, data) {
  localStorage.setItem('admin_' + name, JSON.stringify(data));
}

function mergeData(fileData, storeName) {
  const local = getLocalStore(storeName);
  const map = new Map();
  for (const item of fileData) map.set(item.id, item);
  for (const item of local) {
    if (item._deleted) map.delete(item.id);
    else map.set(item.id, item);
  }
  return Array.from(map.values());
}

function loadLocalJson(path) {
  return new Promise(resolve => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', path, true);
    xhr.onload = () => {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch { resolve([]); }
    };
    xhr.onerror = () => resolve([]);
    xhr.send();
  });
}

async function loadJsonFile(path) {
  try {
    const r = await fetch(path);
    if (r.ok) return await r.json();
  } catch {}
  try { return await loadLocalJson(path); } catch {}
  return [];
}

async function loadStaticData() {
  const [tickets, reports, purchases, vips, staff, users] = await Promise.all([
    loadJsonFile('data/tickets.json'),
    loadJsonFile('data/reports.json'),
    loadJsonFile('data/purchases.json'),
    loadJsonFile('data/vips.json'),
    loadJsonFile('data/staff.json'),
    loadJsonFile('data/users.json')
  ]);
  stores.tickets = mergeData(tickets, 'tickets');
  stores.reports = mergeData(reports, 'reports');
  stores.purchases = mergeData(purchases, 'purchases');
  stores.vips = mergeData(vips, 'vips');
  stores.staff = mergeData(staff, 'staff');
  usersList = users;
}

async function authenticateUser(username, password) {
  let users = await loadJsonFile('data/users.json');
  if (!users.length) {
    users = [
      { username: 'admin', password: 'senha123', role: 'admin' },
      { username: 'guilherme', password: 'staff123', role: 'staff' },
      { username: 'moderador', password: 'senha456', role: 'admin' },
      { username: 'joaozinho', password: '123456', role: 'admin' },
      { username: 'suporte', password: 'senha789', role: 'support' },
      { username: 'rafael', password: 'staff456', role: 'staff' }
    ];
  }
  const user = users.find(u => u.username === username && u.password === password);
  if (user) {
    return { id: genId(), username: user.username, role: user.role, name: user.username };
  }
  return null;
}

if (STATIC_MODE) {
  console.log('[Admin] Modo estático (GitHub Pages)');
}

function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast-item toast-' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function api(path, opts) {
  if (STATIC_MODE) return staticApi(path, opts);
  const url = API + path + (path.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(TOKEN);
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts?.headers || {}) }
  }).then(r => {
    if (r.status === 401) { logout(); return null; }
    return r.json();
  }).catch(() => null);
}

function safeApi(path, opts) {
  if (STATIC_MODE) return staticApi(path, opts);
  const url = API + path + (path.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(TOKEN);
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts?.headers || {}) }
  }).then(r => r.json()).catch(() => null);
}

async function staticApi(path, opts) {
  if (path === '/api/auth/me') return USER;
  if (path.startsWith('/api/admin/users')) return usersList;
  const m = path.match(/^\/api\/admin\/(\w+)(?:\/(\w+))?/);
  if (!m) return null;
  const type = m[1];
  const id = m[2];
  if (!opts || opts.method === 'GET' || !opts.method) {
    if (id) return stores[type]?.find(x => x.id === id) || null;
    return stores[type] || [];
  }
  const method = opts.method;
  const body = opts.body ? JSON.parse(opts.body) : {};
  if (method === 'PATCH' && id) {
    const idx = stores[type].findIndex(x => x.id === id);
    if (idx >= 0) {
      stores[type][idx] = { ...stores[type][idx], ...body, updatedAt: new Date().toISOString() };
      saveLocalStore(type, stores[type]);
    }
    return stores[type][idx] || null;
  }
  if (method === 'POST' && !id) {
    const entry = { ...body, id: genId(), createdAt: new Date().toISOString(), status: body.status || 'active' };
    stores[type] = [entry, ...(stores[type] || [])];
    saveLocalStore(type, stores[type]);
    return { success: true, id: entry.id };
  }
  if (method === 'POST' && id && path.includes('/reply')) {
    const text = body.text;
    if (!text) return null;
    const idx = stores[type].findIndex(x => x.id === id);
    if (idx >= 0) {
      if (!stores[type][idx].messages) {
        stores[type][idx].messages = [{ text: stores[type][idx].message, role: 'user', name: stores[type][idx].name, createdAt: stores[type][idx].createdAt }];
      }
      const name = USER?.role === 'admin' || USER?.role === 'dono' ? 'Admin (' + (USER?.username || '') + ')' : 'Suporte (' + (USER?.username || '') + ')';
      stores[type][idx].messages.push({ text, role: 'admin', name, createdAt: new Date().toISOString() });
      stores[type][idx].updatedAt = new Date().toISOString();
      saveLocalStore(type, stores[type]);
    }
    return stores[type][idx] || null;
  }
  if (method === 'DELETE' && id) {
    if (type === 'users') {
      usersList = usersList.filter(x => String(x.id) !== String(id) && String(x.username) !== String(id));
      return { success: true };
    }
    const local = getLocalStore(type).filter(x => x.id !== id);
    stores[type] = stores[type].filter(x => x.id !== id);
    saveLocalStore(type, local);
    return { success: true };
  }
  return null;
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) return;
  const errDiv = document.getElementById('loginError');
  errDiv.style.display = 'none';
  const btn = document.querySelector('.login-box button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  try {
    if (STATIC_MODE) {
      const user = await authenticateUser(username, password);
      if (!user) {
        errDiv.textContent = 'Usuário ou senha inválidos';
        errDiv.style.display = 'block';
        return;
      }
      TOKEN = genId();
      USER = user;
      sessionStorage.setItem('adminToken', TOKEN);
      sessionStorage.setItem('adminUser', JSON.stringify(USER));
      await initApp();
    } else {
      const res = await fetch(API + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      let data;
      try { data = await res.json(); } catch { data = {}; }
      if (!res.ok || !data.token) {
        errDiv.textContent = data.error || 'Usuário ou senha inválidos';
        errDiv.style.display = 'block';
        return;
      }
      TOKEN = data.token;
      sessionStorage.setItem('adminToken', TOKEN);
      await initApp();
    }
  } catch (e) {
    errDiv.textContent = 'Erro de conexão.';
    errDiv.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function switchTab(tab) {
  if (currentChatTicketId && currentTab === 'ticketChat' && tab === 'tickets' && !_allowSwitchFromChat) return;

  if (tabBtn) tabBtn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

  if (el) el.classList.add('active');

  else if (tab === 'reportChat') renderReportChat();
  else renderTab(tab);

    ta.onkeydown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doReply(id); return false; } };
    btn.onclick = function(e) { e.preventDefault(); doReply(id); return false; };

async function doReply(id) {
  const ta = document.getElementById('replyText');
  const btn = document.getElementById('sendBtn');
  if (!ta || !btn) return;
  const text = ta.value.trim();
  if (!text) return;
  sessionStorage.setItem('chatTicketId', id);
  btn.disabled = true;
  const name = USER?.role === 'admin' || USER?.role === 'dono' ? 'Admin (' + (USER?.username || '') + ')' : 'Suporte (' + (USER?.username || '') + ')';
  const optimistic = { text, role: 'admin', name, createdAt: new Date().toISOString() };
  const idx = stores.tickets.findIndex(x => x.id === id);
  if (idx >= 0) {
    if (!stores.tickets[idx].messages) stores.tickets[idx].messages = [{ text: stores.tickets[idx].message, role: 'user', name: stores.tickets[idx].name, createdAt: stores.tickets[idx].createdAt }];
    stores.tickets[idx].messages.push(optimistic);
    saveLocalStore('tickets', stores.tickets);
    updateChatMessages(stores.tickets[idx].messages);
  }
  ta.value = '';
  ta.style.height = 'auto';
  btn.disabled = false;
}

function updateChatMessages(msgs) {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
  el.innerHTML = msgs.map(m => `
    <div class="chat-msg${m.role === 'admin' ? ' admin' : ''}">
      <div class="meta"><strong>${m.name || m.role}</strong><span class="time">${new Date(m.createdAt).toLocaleString('pt-BR')}</span></div>
      <div class="text">${m.text}</div>
    </div>
  `).join('');
  if (wasAtBottom || true) requestAnimationFrame(() => el.scrollTop = el.scrollHeight);
}

function startChatPolling(id) {
  if (chatInterval) clearInterval(chatInterval);
  chatTicketId = id;
  chatInterval = setInterval(async () => {
    if (currentChatTicketId === id) {
      let t;
      if (STATIC_MODE) {
        const local = getLocalStore('tickets');
        t = local.find(x => x.id === id);
        if (t) {
          const idx = stores.tickets.findIndex(x => x.id === id);
          if (idx >= 0) stores.tickets[idx] = t;
        }
      } else {
        t = await safeApi('/api/admin/tickets/' + id);
        if (t && !t.error) {
          const idx = stores.tickets.findIndex(x => x.id === id);
          if (idx >= 0) stores.tickets[idx] = t;
        }
      }
      if (t) {
        const msgs = t.messages || [{ text: t.message, role: 'user', name: t.name, createdAt: t.createdAt }];
        updateChatMessages(msgs);
      }
    } else {
      clearInterval(chatInterval);
      chatInterval = null;
      chatTicketId = null;
    }
  }, 3000);
}

// ===== VIPS =====
function renderVips() {
  const list = stores.vips;
  const active = list.filter(v => v.status === 'active');
  const now = Date.now();
  const dayMs = 86400000;
  const expiringSoon = active.filter(v => {
    const diff = new Date(v.expiresAt).getTime() - now;
    return diff > 0 && diff <= 7 * dayMs;
  });
  const expiringCritical = expiringSoon.filter(v => {
    const diff = new Date(v.expiresAt).getTime() - now;
    return diff <= 3 * dayMs;
  });
  const c = document.getElementById('tabVips');
  c.innerHTML = `
    <h1>⭐ VIPs</h1>
    ${expiringSoon.length ? '<div class="alert-banner"><span class="icon">⏳</span><div class="msg"><strong>' + expiringSoon.length + ' VIP' + (expiringSoon.length > 1 ? 's' : '') + ' expir' + (expiringSoon.length > 1 ? 'am' : 'e') + ' em breve!</strong> ' + expiringCritical.length + ' crítico' + (expiringCritical.length > 1 ? 's' : '') + ' — menos de 3 dias</div></div>' : ''}
    <div class="stats-row">
      <div class="stat-pill"><div class="num">${list.length}</div><div class="label">Total</div></div>
      <div class="stat-pill"><div class="num">${active.length}</div><div class="label">Ativos</div></div>
      <div class="stat-pill ${expiringSoon.length ? 'stat-pill-warning' : ''}"><div class="num">${expiringSoon.length}</div><div class="label">Expirando</div></div>
    </div>
    <div class="action-bar">
      <input type="text" placeholder="Buscar..." id="vipSearch" oninput="renderVips()">
      <button class="btn btn-primary" onclick="showAddVip()">+ Novo VIP</button>
    </div>
    <div class="table-wrap">${list.length === 0 ? '<div class="empty">Nenhum VIP</div>' : `
    <table><thead><tr>
      <th>ID</th><th>Nome</th><th>Plano</th><th>Expira</th><th>Restam</th><th>Status</th><th>Ações</th>
    </tr></thead><tbody>${list.map(v => {
      const expDate = new Date(v.expiresAt).getTime();
      const diff = expDate - now;
      const dl = v.status === 'active'
        ? diff > 0 ? { text: Math.ceil(diff / dayMs) + 'd', cls: diff <= 3 * dayMs ? 'badge-danger' : diff <= 7 * dayMs ? 'badge-warning' : '' } : { text: 'Expirado', cls: '' }
        : { text: v.status, cls: '' };
      const dateColor = v.status === 'active' && diff > 0 && diff <= 3 * dayMs ? 'var(--danger)' : diff <= 7 * dayMs ? 'var(--warning)' : '';
      return `
      <tr${v.status === 'active' && diff > 0 && diff <= 7 * dayMs ? ' class="expiring"' : ''}>
        <td style="color:#555;font-size:0.75rem">${v.id?.slice(0,8) || '—'}</td>
        <td>${v.name}</td>
        <td>${v.plan || 'VIP'}</td>
        <td style="color:${dateColor};font-size:0.75rem">${new Date(v.expiresAt).toLocaleDateString('pt-BR')}</td>
        <td>${dl.cls ? `<span class="badge ${dl.cls}">${dl.text}</span>` : `<span style="color:#555;font-size:0.75rem">${dl.text}</span>`}</td>
        <td><span class="badge badge-${v.status}">${v.status}</span></td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="editVip('${v.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="showDeleteConfirm('${v.id}','vips','VIP')">🗑️</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table>`}`;
}

      <input type="text" id="newUserUsername" placeholder="Usuário" style="width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;margin-bottom:8px">
      <input type="password" id="newUserPass" placeholder="Senha" style="width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;margin-bottom:8px">
      <select id="newUserRole" style="width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;margin-bottom:12px">
        <option value="user">Usuário</option>
        <option value="staff">Staff</option>
        <option value="suporte">Suporte</option>
        <option value="moderador">Moderador</option>
        <option value="admin">Admin</option>
      </select>
      <button class="btn btn-primary" onclick="saveUser()">Criar Usuário</button>
    </div>`;
  document.getElementById('genericModal').classList.add('active');
}

function saveUser() {
  const name = document.getElementById('newUserName').value.trim();
  const username = document.getElementById('newUserUsername').value.trim();
  const password = document.getElementById('newUserPass').value;
  const role = document.getElementById('newUserRole').value;
  if (!username || !password) { showToast('Preencha usuário e senha', 'error'); return; }
  if (usersList.some(u => u.username === username)) { showToast('Usuário já existe', 'error'); return; }
  const entry = { id: usersList.length + 1, name: name || username, username, password, role, status: 'active', created_at: new Date().toISOString() };
  usersList.push(entry);
  closeModal('genericModal');
  refreshAndStay();
  showToast('Usuário criado', 'success');
}

function editUser(id) {
  const u = usersList.find(x => x.id === id);
  if (!u) return;
  document.getElementById('genericModalTitle').textContent = '✏️ Editando: ' + (u.name || u.username);
  document.getElementById('genericModalBody').innerHTML = `
    <div id="userForm">
      <input type="text" id="editUserName" value="${u.name || ''}" placeholder="Nome" style="width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;margin-bottom:8px">
      <input type="password" id="editUserPass" placeholder="Nova senha (deixe vazio para manter)" style="width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;margin-bottom:8px">
      <select id="editUserRole" style="width:100%;padding:8px 12px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:0.85rem;outline:none;margin-bottom:12px">
        <option value="user"${u.role === 'user' ? ' selected' : ''}>Usuário</option>
        <option value="staff"${u.role === 'staff' ? ' selected' : ''}>Staff</option>
        <option value="suporte"${u.role === 'suporte' ? ' selected' : ''}>Suporte</option>
        <option value="moderador"${u.role === 'moderador' ? ' selected' : ''}>Moderador</option>
        <option value="admin"${u.role === 'admin' ? ' selected' : ''}>Admin</option>
      </select>
      <button class="btn btn-primary" onclick="updateUser(${id})">Salvar</button>
    </div>`;
  document.getElementById('genericModal').classList.add('active');
}

function updateUser(id) {
  const name = document.getElementById('editUserName').value.trim();
  const password = document.getElementById('editUserPass').value;
  const role = document.getElementById('editUserRole').value;
  const idx = usersList.findIndex(x => x.id === id);
  if (idx >= 0) {
    usersList[idx].name = name || usersList[idx].name;
    usersList[idx].role = role;
    if (password) usersList[idx].password = password;
  }
  closeModal('genericModal');
  refreshAndStay();
  showToast('Usuário atualizado', 'success');
}

// ===== HELPERS =====
function filterList(list, searchId, filterId) {
  const search = document.getElementById(searchId)?.value?.toLowerCase() || '';
  const filter = filterId ? (document.getElementById(filterId)?.value || '') : '';
  return list.filter(item => {
    if (filter && item.status !== filter) return false;
    if (search) {
      const vals = Object.values(item).filter(v => typeof v === 'string').join(' ').toLowerCase();
      if (!vals.includes(search)) return false;
    }
    return true;
  });
}
</script>
